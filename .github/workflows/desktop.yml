name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            dist: dist:win
          - os: macos-latest
            dist: dist:mac
          - os: ubuntu-latest
            dist: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build desktop app
        working-directory: frontend
        run: npm run ${{ matrix.dist }}
        env:
          # unsigned builds; set CSC_LINK/CSC_KEY_PASSWORD secrets to sign
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: paperclaw-${{ matrix.os }}
          path: |
            frontend/dist/*.exe
            frontend/dist/*.zip
            frontend/dist/*.dmg
            frontend/dist/*.AppImage
          if-no-files-found: error
